<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cast Your Vote</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 id="title"><span class="chili-emoji">🌶️</span> Cast Your Vote <span class="chili-emoji">🌶️</span></h1>
      <p style="text-align: center; font-size: 16px;">Rate each chili from 1 (mild) to 5 (🔥 HOT 🔥)</p>
      <p style="text-align: center; color: var(--muted); font-size: 14px; margin-bottom: 20px;">
        Vote on <strong>Appearance</strong>, <strong>Aroma</strong>, <strong>Consistency</strong>, <strong>Taste</strong>, and <strong>Aftertaste</strong>
      </p>
      <div id="share" style="margin:15px 0; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 12px;">
        <strong style="color: var(--accent-2);">📱 Share this vote link:</strong><br>
        <a id="share-link" href="" style="color: var(--accent); word-break: break-all;"></a>
        <canvas id="qr-code" style="display:block; margin: 10px auto 0; max-width:180px; border-radius: 10px;"></canvas>
      </div>
      <div style="margin-bottom:15px;">
        <label for="candidate">🍲 Select a Chili Contestant:</label>
        <select id="candidate" style="width: 100%; font-size: 16px;"></select>
      </div>
      <div id="categories"></div>
      <div style="margin-top:20px; text-align: center;">
        <button id="submit" class="btn btn-primary" style="font-size: 18px; padding: 14px 30px;">
          🔥 Submit Your Vote 🔥
        </button>
      </div>
      <div style="margin-top:15px; text-align: center;">
        <a class="pill" href="/display.html" style="font-size: 14px;">📊 View Live Results</a>
        <a class="pill" href="/admin.html" style="font-size: 14px; margin-left: 10px;">⚙️ Setup</a>
      </div>
      <p id="thanks" class="pill" style="display:none; margin-top:15px; background: var(--chili-red); color: white; font-weight: 700;">
        ✅ Thanks for voting! Your taste buds have spoken! 🌶️
      </p>
    </div>
    <div class="footer">🌶️ May the best chili win! 🌶️</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const candidateSelect = document.getElementById('candidate');
    const categoriesDiv = document.getElementById('categories');
    const thanks = document.getElementById('thanks');
    const shareLink = document.getElementById('share-link');
    const qrCanvas = document.getElementById('qr-code');
    const selections = {};
    let categories = [];

    const url = window.location.href;
    shareLink.textContent = url;
    shareLink.href = url;
    if (window.QRCode) {
      QRCode.toCanvas(qrCanvas, url, { width: 128 }, err => {
        if (err) console.error(err);
      });
    }

    fetch('/config').then(r => r.json()).then(cfg => {
      document.title = cfg.contestName + ' – Cast Your Vote';
      document.getElementById('title').textContent = cfg.contestName;
      cfg.candidates.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c;
        opt.textContent = c;
        candidateSelect.appendChild(opt);
      });
      categories = cfg.categories;
      categories.forEach(cat => {
        const div = document.createElement('div');
        div.className = 'category';
        const buttons = [1,2,3,4,5].map(n =>
          `<button type="button" class="rating-btn" data-cat="${cat}" data-val="${n}">${n}</button>`
        ).join('');
        div.innerHTML = `<label>${cat}</label><div class="ratings">${buttons}</div>`;
        categoriesDiv.appendChild(div);
      });
    });

    categoriesDiv.addEventListener('click', e => {
      if (!e.target.matches('.rating-btn')) return;
      const cat = e.target.dataset.cat;
      const val = Number(e.target.dataset.val);
      selections[cat] = val;
      categoriesDiv.querySelectorAll(`.rating-btn[data-cat="${cat}"]`).forEach(btn => {
        btn.classList.toggle('selected', Number(btn.dataset.val) === val);
      });
    });

    document.getElementById('submit').onclick = () => {
      const candidate = candidateSelect.value;
      if (!candidate) return;
      const ratings = {};
      categories.forEach(cat => {
        if (selections[cat]) ratings[cat] = selections[cat];
      });
      socket.emit('cast-vote', { candidate, ratings });
      thanks.style.display = 'inline-flex';
      setTimeout(() => (thanks.style.display = 'none'), 1500);
      categoriesDiv.querySelectorAll('.rating-btn.selected').forEach(btn => btn.classList.remove('selected'));
      Object.keys(selections).forEach(k => delete selections[k]);
    };
  </script>
</body>
</html>
